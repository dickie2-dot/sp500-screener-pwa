name: Nightly S&P 500 screener

on:
  # Weekdays at 22:00 UTC (≈ 17:00 ET post-close). Long runs are fine here —
  # GitHub Actions allows 6h per job.
  schedule:
    - cron: "0 22 * * 1-5"
  # Manual trigger from the Actions tab.
  workflow_dispatch:
    inputs:
      rate_delay:
        description: "Seconds between Polygon calls (default 13 = free tier safe)"
        required: false
        default: "13"

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # up to 5h if Polygon is being slow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: screener/requirements.txt

      - name: Install deps
        run: pip install -r screener/requirements.txt

      - name: Run screener
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          EDGE_CONFIG_ID:  ${{ secrets.EDGE_CONFIG_ID }}
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          POLYGON_RATE_DELAY: ${{ github.event.inputs.rate_delay || '13' }}
          POLYGON_MAX_RETRIES: "5"
        run: python screener/run.py
