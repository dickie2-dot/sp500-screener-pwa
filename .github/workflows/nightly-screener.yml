name: Nightly S&P 500 screener

on:
  # Weekdays at 22:00 UTC (23:00 BST / 22:00 GMT). Yahoo-based — finishes in ~5 min.
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: screener/requirements.txt

      - name: Install deps
        run: pip install -r screener/requirements.txt

      - name: Run screener
        env:
          EDGE_CONFIG_ID:   ${{ secrets.EDGE_CONFIG_ID }}
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          YAHOO_WORKERS:    "20"
        run: python screener/run.py
