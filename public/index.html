<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal | S&P 500 Radar</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --bg4: #222222;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #555555;
      --muted2: #888888;
      --green: #00ff88;
      --green-dim: rgba(0,255,136,0.06);
      --green-mid: rgba(0,255,136,0.15);
      --amber: #ffaa00;
      --amber-dim: rgba(255,170,0,0.06);
      --amber-mid: rgba(255,170,0,0.15);
      --blue: #4488ff;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.97);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--green); }
      50% { opacity: 0.5; box-shadow: 0 0 4px var(--green); }
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-left: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .scraped-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      background: var(--bg3);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted2);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 15px;
    }

    .refresh-btn:hover { border-color: var(--green); color: var(--green); }
    .refresh-btn.spinning { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MAIN */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
    }

    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.muted { color: var(--muted2); }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      margin-top: 28px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .section-icon.green { background: var(--green-mid); }
    .section-icon.amber { background: var(--amber-mid); }

    .section-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
    }

    .section-sub {
      font-size: 10px;
      color: var(--muted2);
      margin-top: 1px;
    }

    .count-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .count-pill.green {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(0,255,136,0.2);
    }

    .count-pill.amber {
      background: var(--amber-dim);
      color: var(--amber);
      border: 1px solid rgba(255,170,0,0.2);
    }

    /* TICKER CARDS */
    .ticker-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ticker-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
      cursor: pointer;
    }

    .ticker-card:hover { border-color: var(--bg4); }
    .ticker-card.top5 { border-left: 3px solid var(--amber); }
    .ticker-card.expanded { border-color: var(--bg4); }

    .ticker-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
    }

    .ticker-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .rank-badge {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: var(--amber-mid);
      color: var(--amber);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ticker-info {}

    .ticker-symbol {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .ticker-name {
      font-size: 11px;
      color: var(--muted2);
      margin-top: 2px;
    }

    .ticker-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ticker-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 7px;
      border-radius: 4px;
      background: var(--bg3);
      color: var(--muted2);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .chip.good { color: var(--green); border-color: rgba(0,255,136,0.2); background: var(--green-dim); }
    .chip.warn { color: var(--amber); border-color: rgba(255,170,0,0.2); background: var(--amber-dim); }

    .expand-arrow {
      color: var(--muted);
      font-size: 11px;
      transition: transform 0.2s;
      margin-left: 4px;
    }

    .ticker-card.expanded .expand-arrow { transform: rotate(180deg); }

    /* EXPANDED PANEL */
    .ticker-expanded {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px 18px;
      background: var(--bg);
    }

    .ticker-card.expanded .ticker-expanded { display: block; }

    .chart-container {
      height: 140px;
      margin-bottom: 12px;
    }

    .expanded-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .expanded-chip {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted2);
    }

    .expanded-chip span { color: var(--text); font-weight: 500; }

    /* EMPTY / NO SIGNALS */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted2);
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.5; }
    .empty-state p { font-size: 13px; }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 24px;
      color: var(--muted2);
      font-size: 13px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 10px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
      letter-spacing: 0.3px;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-value { font-size: 18px; }
      header { padding: 12px 16px; }
      main { padding: 20px 14px 60px; }
      .ticker-chips { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-text">Signal</div>
      <div class="logo-sub">S&P 500 Radar</div>
    </div>
  </div>
  <div class="header-right">
    <span class="scraped-time" id="scrapedTime">—</span>
    <button class="refresh-btn" id="refreshBtn" title="Refresh" onclick="loadData()">↻</button>
  </div>
</header>

<main>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Trend Signals</div>
      <div class="stat-value green" id="trendCount">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Fallen Angels</div>
      <div class="stat-value amber" id="turnaroundCount">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Universe</div>
      <div class="stat-value muted">500</div>
    </div>
  </div>

  <div id="mainContent">
    <div class="loading">
      <div class="spinner"></div>
      Loading signals...
    </div>
  </div>
</main>

<footer>
  Signal · S&P 500 Daily Screener · Not financial advice
</footer>

<script>
const API = 'https://sp500-screener-pwa.vercel.app/api/signals';

const COMPANY_NAMES = {
  'ACN':'Accenture','ADP':'Automatic Data Processing','ADBE':'Adobe','AMD':'AMD',
  'AMZN':'Amazon','AAPL':'Apple','ABBV':'AbbVie','ABT':'Abbott Laboratories',
  'AXON':'Axon Enterprise','BAC':'Bank of America','BR':'Broadridge Financial',
  'CAG':'Conagra Brands','CAT':'Caterpillar','CEG':'Constellation Energy',
  'CI':'Cigna Group','CLX':'Clorox','CME':'CME Group','CMCSA':'Comcast',
  'COP':'ConocoPhillips','CPB':'Campbell Soup','CRM':'Salesforce',
  'CSGP':'CoStar Group','CVX':'Chevron','DPZ':'Dominos Pizza',
  'EL':'Estee Lauder','EPAM':'EPAM Systems','FDS':'FactSet Research',
  'FIS':'Fidelity National Information','GEN':'Gen Digital',
  'GOOGL':'Alphabet','HPQ':'HP Inc','HUM':'Humana','ICE':'Intercontinental Exchange',
  'INTU':'Intuit','IP':'International Paper','JPM':'JPMorgan Chase',
  'KHC':'Kraft Heinz','KMB':'Kimberly-Clark','KMX':'CarMax','LEN':'Lennar',
  'LULU':'Lululemon','MKC':'McCormick','MSFT':'Microsoft','NDAQ':'Nasdaq',
  'NKE':'Nike','NOW':'ServiceNow','NVDA':'Nvidia','PAYX':'Paychex',
  'PGR':'Progressive','PLTR':'Palantir','PTC':'PTC Inc','QCOM':'Qualcomm',
  'SYK':'Stryker','TXN':'Texas Instruments','VRSK':'Verisk Analytics',
  'VST':'Vistra Corp','WMT':'Walmart','BKNG':'Booking Holdings',
  'AMGN':'Amgen','BA':'Boeing','BLK':'BlackRock',
  'BX':'Blackstone','C':'Citigroup','CAH':'Cardinal Health','CB':'Chubb',
  'CDNS':'Cadence Design','CL':'Colgate-Palmolive','COF':'Capital One',
  'CZR':'Caesars Entertainment','D':'Dominion Energy','DE':'Deere',
  'DHR':'Danaher','DIS':'Walt Disney','DOW':'Dow','DUK':'Duke Energy',
  'EXC':'Exelon','F':'Ford Motor','GD':'General Dynamics','GE':'GE Aerospace',
  'GS':'Goldman Sachs','HD':'Home Depot','HON':'Honeywell','IBM':'IBM',
  'JNJ':'Johnson & Johnson','KO':'Coca-Cola','LIN':'Linde','LLY':'Eli Lilly',
  'LMT':'Lockheed Martin','MA':'Mastercard','MCD':'McDonalds','MDT':'Medtronic',
  'MET':'MetLife','MMM':'3M','MO':'Altria','MRK':'Merck','MS':'Morgan Stanley',
  'NEE':'NextEra Energy','NFLX':'Netflix','PEP':'PepsiCo','PFE':'Pfizer',
  'PG':'Procter & Gamble','PM':'Philip Morris','RTX':'RTX Corp',
  'SBUX':'Starbucks','SO':'Southern Company','SPG':'Simon Property',
  'T':'AT&T','TMO':'Thermo Fisher','TSLA':'Tesla','UNH':'UnitedHealth',
  'UNP':'Union Pacific','UPS':'UPS','USB':'U.S. Bancorp','V':'Visa',
  'VZ':'Verizon','WBA':'Walgreens','WFC':'Wells Fargo','XOM':'Exxon Mobil'
};

function getName(ticker) {
  return COMPANY_NAMES[ticker] || ticker;
}

let chartInstances = {};

function destroyChart(id) {
  if (chartInstances[id]) {
    chartInstances[id].destroy();
    delete chartInstances[id];
  }
}

function renderSparkline(canvasId, ticker) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  destroyChart(canvasId);

  fetch(`/api/chart?ticker=${ticker}`)
    .then(r => r.json())
    .then(data => {
      const closes = data.closes.filter(c => c !== null);
      const timestamps = data.timestamps.slice(-closes.length);
      const labels = timestamps.map(t => {
        const d = new Date(t * 1000);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      });

      const first = closes[0];
      const last = closes[closes.length - 1];
      const color = last >= first ? '#00ff88' : '#ff4466';
      const bgColor = last >= first ? 'rgba(0,255,136,0.05)' : 'rgba(255,68,102,0.05)';

      chartInstances[canvasId] = new Chart(canvas, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            data: closes,
            borderColor: color,
            borderWidth: 2,
            fill: true,
            backgroundColor: bgColor,
            pointRadius: 0,
            tension: 0.2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              mode: 'index',
              intersect: false,
              callbacks: {
                label: ctx => `$${ctx.parsed.y.toFixed(2)}`
              }
            }
          },
          scales: {
            x: {
              display: true,
              ticks: {
                color: '#444',
                font: { size: 9 },
                maxTicksLimit: 6,
                maxRotation: 0
              },
              grid: { display: false }
            },
            y: {
              display: true,
              position: 'right',
              ticks: {
                color: '#444',
                font: { size: 9 },
                maxTicksLimit: 4,
                callback: v => '$' + v.toFixed(0)
              },
              grid: { color: 'rgba(255,255,255,0.03)' }
            }
          }
        }
      });
    })
    .catch(err => {
      console.error('Chart error:', err);
      if (canvas && canvas.parentElement) {
        canvas.parentElement.innerHTML = '<p style="color:#555;font-size:11px;text-align:center;padding:40px 0">Chart unavailable</p>';
      }
    });
}

function toggleCard(id, ticker) {
  const card = document.getElementById(id);
  const isExpanded = card.classList.contains('expanded');
  if (isExpanded) {
    card.classList.remove('expanded');
    destroyChart(`chart-${id}`);
  } else {
    card.classList.add('expanded');
    renderSparkline(`chart-${id}`, ticker);
  }
}

function renderTickerCard(ticker, index, isTop5, type) {
  const id = `card-${type}-${index}`;
  const name = getName(ticker);
  const rankHtml = isTop5
    ? `<div class="rank-badge">#${index+1}</div>`
    : `<div style="width:26px;height:26px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)">◆</div>`;

  return `
    <div class="ticker-card ${isTop5 ? 'top5' : ''}" id="${id}" onclick="toggleCard('${id}', '${ticker}')">
      <div class="ticker-main">
        <div class="ticker-left">
          ${rankHtml}
          <div class="ticker-info">
            <div class="ticker-symbol">${ticker}</div>
            <div class="ticker-name">${name}</div>
          </div>
        </div>
        <div class="ticker-right">
          <div class="ticker-chips">
            <span class="chip good">${type === 'trend' ? 'Bounce' : 'Recovery'}</span>
            <span class="chip">${type === 'trend' ? 'Uptrend' : 'Fallen Angel'}</span>
          </div>
          <span class="expand-arrow">▼</span>
        </div>
      </div>
      <div class="ticker-expanded">
        <div class="chart-container">
          <canvas id="chart-${id}"></canvas>
        </div>
        <div class="expanded-chips">
          <div class="expanded-chip">Tap chart to explore on <span>Yahoo Finance</span></div>
        </div>
      </div>
    </div>`;
}

function renderSection(title, subtitle, icon, colorClass, list, type) {
  if (!list || list.length === 0) {
    return `
      <div class="section-header">
        <div class="section-title">
          <div class="section-icon ${colorClass}">${icon}</div>
          <div>
            <div class="section-name">${title}</div>
            <div class="section-sub">${subtitle}</div>
          </div>
        </div>
        <span class="count-pill ${colorClass}">0</span>
      </div>
      <div class="empty-state">
        <div class="icon">📡</div>
        <p>No signals today</p>
      </div>`;
  }

  const top5 = list.slice(0, 5);
  const rest = list.slice(5);

  let html = `
    <div class="section-header">
      <div class="section-title">
        <div class="section-icon ${colorClass}">${icon}</div>
        <div>
          <div class="section-name">${title}</div>
          <div class="section-sub">${subtitle}</div>
        </div>
      </div>
      <span class="count-pill ${colorClass}">${list.length}</span>
    </div>`;

  if (top5.length > 0) {
    html += `<div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">Top Picks</div>`;
    html += `<div class="ticker-grid">`;
    top5.forEach((t, i) => { html += renderTickerCard(t, i, true, type); });
    html += `</div>`;
  }

  if (rest.length > 0) {
    html += `<div style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:16px 0 8px">Also Meeting Criteria</div>`;
    html += `<div class="ticker-grid">`;
    rest.forEach((t, i) => { html += renderTickerCard(t, i, false, type); });
    html += `</div>`;
  }

  return html;
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const res = await fetch(API + '?t=' + Date.now());
    const data = await res.json();

    document.getElementById('trendCount').textContent = data.trend_count ?? 0;
    document.getElementById('turnaroundCount').textContent = data.turnaround_count ?? 0;
    document.getElementById('scrapedTime').textContent = data.last_scraped ? 'Scraped ' + data.last_scraped : data.date || '—';

    let html = '';

    if (data.trend_count === 0 && data.turnaround_count === 0) {
      html = `<div class="empty-state" style="margin-top:40px">
        <div class="icon">📊</div>
        <p>No signals today — markets may be closed or conditions not met.</p>
      </div>`;
    } else {
      html += renderSection('Trend Radar', 'Confirmed bounce in uptrend', '📈', 'green', data.trend || [], 'trend');
      html += renderSection('Fallen Angels', 'Quality stocks in recovery', '🔄', 'amber', data.turnaround || [], 'turnaround');
    }

    document.getElementById('mainContent').innerHTML = html;

  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state" style="margin-top:40px">
        <div class="icon">⚠️</div>
        <p>Unable to load signals. Check connection.</p>
      </div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
